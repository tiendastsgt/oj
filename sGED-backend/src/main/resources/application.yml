spring:
  application:
    name: sged-backend
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/SGED}
    username: ${DB_USER:sged}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: ${DB_POOL_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:change-me}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

sged:
  documentos:
    storage:
      base-path: ${DOCUMENTOS_BASE_PATH:C:/sged/documentos}
      max-size-bytes: ${DOCUMENTOS_MAX_SIZE:104857600}
      conversion:
        enabled: ${DOCUMENTOS_CONVERSION_ENABLED:true}
        temp-suffix: ${DOCUMENTOS_CONVERSION_SUFFIX:.preview.pdf}

jodconverter:
  local:
    enabled: ${DOCUMENTOS_CONVERSION_ENABLED:true}
    office-home: ${LIBREOFFICE_HOME:/usr/lib/libreoffice}
    max-tasks-per-process: 10
    process-timeout: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ========================================
# Spring Profiles:
# - default (production-like)
# - dev (local development with H2)
# - qa (QA environment with H2)
# - test (unit tests with H2)
# 
# Use: export SPRING_PROFILES_ACTIVE=qa
# ========================================
