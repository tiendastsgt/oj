# NGINX Configuration for Production
# Optimizada para SGED Fase 6
# Uso: docker-compose -f docker-compose-prod.yml

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================
    # Logging
    # ========================================
    log_format security '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        '$request_time $upstream_response_time '
                        '"$ssl_protocol" "$ssl_cipher"';

    access_log /var/log/nginx/access.log security buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ========================================
    # Performance
    # ========================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    client_header_buffer_size 16k;
    large_client_header_buffers 4 32k;

    # ========================================
    # Compression
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;

    # Security
    server_tokens off;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========================================
    # Rate limiting (DDoS protection)
    # ========================================
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=docs:10m rate=3r/s;

    # ========================================
    # Upstream backend
    # ========================================
    upstream backend {
        server sged-backend:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ========================================
    # HTTP → HTTPS Redirect
    # ========================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================
    # HTTPS Server
    # ========================================
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # ========================================
        # SSL/TLS Configuration (PRODUCTION)
        # ========================================
        ssl_certificate /etc/letsencrypt/live/sged.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sged.example.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/sged.example.com/chain.pem;

        # TLS Versions
        ssl_protocols TLSv1.2 TLSv1.3;

        # Ciphers (Mozilla Intermediate)
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;

        # SSL Session
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ========================================
        # Security Headers (HSTS, CSP, etc.)
        # ========================================
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

        # Content-Security-Policy (producción)
        add_header Content-Security-Policy "
          default-src 'self';
          script-src 'self';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: https:;
          font-src 'self' data:;
          connect-src 'self' https:;
          frame-ancestors 'none';
          base-uri 'self';
          form-action 'self';
        " always;

        # ========================================
        # Logging
        # ========================================
        access_log /var/log/nginx/sged-access.log security buffer=32k flush=5s;
        error_log /var/log/nginx/sged-error.log warn;

        # ========================================
        # Root
        # ========================================
        location = / {
            return 301 /app/;
        }

        # ========================================
        # Frontend (Angular SPA)
        # ========================================
        location /app/ {
            alias /var/www/sged-frontend/dist/sged-frontend/;
            try_files $uri $uri/ /app/index.html;
            
            # Cache busting para index.html
            location = /app/index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }

            error_page 404 =200 /app/index.html;
            expires 1h;
        }

        # ========================================
        # Static assets (cache agresivo)
        # ========================================
        location ~* /app/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /var/www/sged-frontend/dist/sged-frontend/$1;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ========================================
        # API endpoints
        # ========================================
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_set_header Connection "";
            proxy_http_version 1.1;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ========================================
        # Auth endpoints (rate limiting estricto)
        # ========================================
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # Document endpoints
        # ========================================
        location /api/v1/documentos/ {
            limit_req zone=docs burst=3 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Large file uploads/downloads
            client_max_body_size 100M;
        }

        # ========================================
        # Health check
        # ========================================
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ========================================
        # Deny sensitive files
        # ========================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
        }

        location ~ ^/(WEB-INF|META-INF)/ {
            deny all;
        }

        location ~ \.(xml|properties|gradle|maven|yml|yaml)$ {
            deny all;
        }
    }
}
