# NGINX Configuration for SGED
# Fase 6: Reverse proxy + HTTPS + Security Headers
# Entornos: QA, Producción

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;

    # Hide nginx version
    server_tokens off;

    # Rate limiting (protección contra DDoS)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Upstream backends
    upstream backend {
        # Backend SGED (interno, puerto 8080)
        server sged-backend:8080 max_fails=3 fail_timeout=30s;
    }

    # ========================================
    # HTTP → HTTPS redirect (QA/Prod only)
    # ========================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME challenge para Let's Encrypt (si aplica)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect todo HTTP → HTTPS (excepto ACME)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================
    # HTTPS Server (QA/Prod)
    # ========================================
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # SSL/TLS Configuration
        # NOTA: En producción, usar certificados reales (Let's Encrypt, digicert, etc.)
        # Para QA/desarrollo, generar con:
        #   openssl req -x509 -newkey rsa:4096 -keyout /etc/nginx/certs/private.key \
        #     -out /etc/nginx/certs/certificate.crt -days 365 -nodes
        ssl_certificate /etc/nginx/certs/certificate.crt;
        ssl_certificate_key /etc/nginx/certs/private.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # OCSP Stapling (producción)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/certs/chain.crt;

        # ========================================
        # Security Headers (HTTPS only)
        # ========================================
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Content-Security-Policy
        # Nota: Ajustar según necesidades del frontend Angular
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self';" always;

        # ========================================
        # Logging
        # ========================================
        access_log /var/log/nginx/sged-access.log main;
        error_log /var/log/nginx/sged-error.log warn;

        # ========================================
        # Root path (health check / redirect)
        # ========================================
        location = / {
            return 301 /app/;
        }

        # ========================================
        # Frontend Angular (compilado dist/)
        # ========================================
        location /app/ {
            alias /var/www/sged-frontend/dist/sged-frontend/;
            try_files $uri $uri/ /app/index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";

            # SPA routing: cualquier 404 → index.html
            error_page 404 =200 /app/index.html;
        }

        # ========================================
        # Static assets (con cache agresivo)
        # ========================================
        location ~* /app/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /var/www/sged-frontend/dist/sged-frontend/$1;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ========================================
        # Backend API proxy
        # ========================================
        location /api/ {
            # Rate limiting para API
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy settings
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Error handling
            proxy_intercept_errors on;
        }

        # ========================================
        # Auth endpoints (rate limiting más estricto)
        # ========================================
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # Health check endpoint
        # ========================================
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ========================================
        # Deny access a archivos sensibles
        # ========================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ========================================
        # Bloquear acceso directo a carpetas
        # ========================================
        location ~ ^/(WEB-INF|META-INF)/ {
            deny all;
        }
    }

    # ========================================
    # Configuración adicional por entorno
    # ========================================
    # Incluir archivos específicos si existen:
    # - /etc/nginx/conf.d/qa.conf
    # - /etc/nginx/conf.d/prod.conf
    include /etc/nginx/conf.d/*.conf;
}
