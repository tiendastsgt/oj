version: '3.8'

services:
  sged-backend:
    container_name: sged-backend-lite
    build:
      context: ./sGED-backend
      dockerfile: Dockerfile
    image: sged-backend-lite:latest
    ports:
      - "8086:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://sged-mysql-lite:3306/sged_db
      SPRING_DATASOURCE_USERNAME: sged_user
      SPRING_DATASOURCE_PASSWORD: sged_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      JWT_SECRET: sged-vps-lite-secret-key-minimum-32-chars-ok
      DOCUMENTOS_BASE_PATH: /opt/sged-docs
      DOCUMENTOS_CONVERSION_ENABLED: "true"
      JAVA_OPTS: "-Xms64m -Xmx192m --add-opens java.base/sun.security.util=ALL-UNNAMED"
    deploy:
      resources:
        limits:
          memory: 450M
    depends_on:
      - mysql
    volumes:
      - sged_docs_lite:/opt/sged-docs
    networks:
      - sged-vps-net
    restart: unless-stopped

  sged-frontend:
    container_name: sged-frontend-lite
    build:
      context: ./sGED-frontend
      dockerfile: Dockerfile
    image: sged-frontend-lite:latest
    ports:
      - "8085:80"
    environment:
      - BACKEND_URL=http://51.161.32.204:8086
    deploy:
      resources:
        limits:
          memory: 30M
    depends_on:
      - sged-backend
    networks:
      - sged-vps-net
    restart: unless-stopped

  mysql:
    container_name: sged-mysql-lite
    image: mysql:8.0-debian
    command: --innodb-buffer-pool-size=128M --performance-schema=OFF --innodb-log-file-size=48M --table-open-cache=200 --max-connections=50
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sged_db
      MYSQL_USER: sged_user
      MYSQL_PASSWORD: sged_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_lite:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - sged-vps-net
    restart: unless-stopped

networks:
  sged-vps-net:
    driver: bridge

volumes:
  mysql_data_lite:
  sged_docs_lite:
