<p-table
  [value]="resultados?.content ?? []"
  [lazy]="true"
  [paginator]="true"
  [rows]="rows"
  [first]="first"
  [totalRecords]="totalRecords"
  [loading]="loading"
  [rowsPerPageOptions]="[10, 25, 50]"
  (onLazyLoad)="lazyLoad.emit($event)"
  sortField="fechaUltimoMovimiento"
  sortOrder="-1"
>
  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="numero">Número <p-sortIcon field="numero"></p-sortIcon></th>
      <th>Juzgado</th>
      <th>Estado</th>
      <th>Tipo</th>
      <th pSortableColumn="fechaInicio">Fecha inicio <p-sortIcon field="fechaInicio"></p-sortIcon></th>
      <th pSortableColumn="fechaUltimoMovimiento">Último movimiento <p-sortIcon field="fechaUltimoMovimiento"></p-sortIcon></th>
      <th>Fuente</th>
      <th>Acciones</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-row>
    <tr>
      <td>{{ row.numero }}</td>
      <td>{{ row.juzgado }}</td>
      <td>{{ row.estado }}</td>
      <td>{{ row.tipoProceso }}</td>
      <td>{{ row.fechaInicio | date: 'yyyy-MM-dd' }}</td>
      <td>{{ row.fechaUltimoMovimiento | date: 'yyyy-MM-dd' }}</td>
      <td>{{ row.fuente }}</td>
      <td class="acciones">
        <button
          pButton
          type="button"
          label="Ver"
          icon="pi pi-eye"
          class="p-button-text"
          *ngIf="canNavigate(row)"
          [routerLink]="['/expedientes', row.id]"
        ></button>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="8">No se encontraron resultados.</td>
    </tr>
  </ng-template>
</p-table>

<div class="messages">
  <p-message *ngFor="let message of errorMessages" severity="error" [text]="message"></p-message>
</div>
