<div class="dashboard-container">
  <!-- KPI Section -->
  <div class="kpi-grid">
    <app-kpi-card 
      label="Total Expedientes" 
      [value]="totalExpedientes" 
      icon="pi-folder-open" 
      color="#4f46e5"
      [trend]="12">
    </app-kpi-card>
    <app-kpi-card 
      label="Casos Activos" 
      [value]="activosCount" 
      icon="pi-bolt" 
      color="#22c55e"
      [trend]="5">
    </app-kpi-card>
    <app-kpi-card 
      label="Pendientes" 
      [value]="pendientesCount" 
      icon="pi-clock" 
      color="#eab308"
      [trend]="-2">
    </app-kpi-card>
    <app-kpi-card 
      label="Cerrados" 
      [value]="cerradosCount" 
      icon="pi-lock" 
      color="#ef4444"
      [trend]="8">
    </app-kpi-card>
  </div>

  <!-- Main Table Section -->
  <div class="content-card shadow-sm">
    <div class="content-header">
      <div class="header-titles">
        <h2>Listado de Expedientes</h2>
        <span class="subtitle">Gestión unificada de casos judiciales</span>
      </div>
      <div class="header-actions">
        <span class="p-input-icon-left search-container">
          <i class="pi pi-search"></i>
          <input 
            type="text" 
            pInputText 
            placeholder="Buscar por número..." 
            class="p-inputtext-sm search-input"
          />
        </span>
        <button
          pButton
          type="button"
          label="Nuevo Expediente"
          icon="pi pi-plus"
          class="p-button-primary p-button-sm action-btn"
          *ngIf="canCreate()"
          routerLink="/expedientes/nuevo"
        ></button>
      </div>
    </div>

    <div class="table-wrapper">
      <p-table
        [value]="expedientes"
        [lazy]="true"
        [paginator]="true"
        [rows]="rows"
        [first]="first"
        [totalRecords]="totalRecords"
        [loading]="loading"
        [rowsPerPageOptions]="[10, 25, 50]"
        (onLazyLoad)="onLazyLoad($event)"
        styleClass="p-datatable-sm custom-table"
        [responsiveLayout]="'scroll'"
      >
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="numero" style="width: 15%">NÚMERO <p-sortIcon field="numero"></p-sortIcon></th>
            <th style="width: 15%">TIPO</th>
            <th style="width: 15%">ESTADO</th>
            <th style="width: 25%">JUZGADO</th>
            <th pSortableColumn="fechaCreacion" style="width: 15%">CREACIÓN <p-sortIcon field="fechaCreacion"></p-sortIcon></th>
            <th style="width: 15%; text-align: center;">ACCIONES</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-expediente>
          <tr class="table-row">
            <td>
              <span class="expediente-number">{{ expediente.numero }}</span>
            </td>
            <td>
              <span class="type-badge">{{ expediente.tipoProcesoId }}</span>
            </td>
            <td>
              <app-status-badge [status]="expediente.estadoId"></app-status-badge>
            </td>
            <td>
              <span class="juzgado-text">{{ expediente.juzgadoId }}</span>
            </td>
            <td>
              <span class="date-text">{{ expediente.fechaCreacion | date: 'dd/MM/yyyy' }}</span>
            </td>
            <td>
              <div class="action-buttons">
                <button
                  pButton
                  type="button"
                  icon="pi pi-eye"
                  class="p-button-text p-button-rounded p-button-secondary action-icon"
                  pTooltip="Ver detalle"
                  [routerLink]="['/expedientes', expediente.id]"
                ></button>
                <button
                  pButton
                  type="button"
                  icon="pi pi-pencil"
                  class="p-button-text p-button-rounded p-button-info action-icon"
                  pTooltip="Editar"
                  *ngIf="canEdit()"
                  [routerLink]="['/expedientes', expediente.id, 'editar']"
                ></button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="6" class="empty-msg">No se encontraron expedientes en el sistema.</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>

  <p-message *ngIf="errorMessage" severity="error" [text]="errorMessage" class="error-msg"></p-message>
</div>

<style>
.dashboard-container {
  padding: 1.5rem;
  background-color: #f8fafc;
  min-height: 100vh;
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1.25rem;
  margin-bottom: 2rem;
}

.content-card {
  background: white;
  border-radius: 16px;
  border: 1px solid #e2e8f0;
  overflow: hidden;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

.content-header {
  padding: 1.5rem 2rem;
  border-bottom: 1px solid #f1f5f9;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}

.header-titles h2 {
  margin: 0;
  font-size: 1.5rem;
  color: #1e293b;
  font-weight: 700;
}

.subtitle {
  color: #64748b;
  font-size: 0.875rem;
}

.header-actions {
  display: flex;
  gap: 0.75rem;
  align-items: center;
}

.search-container {
  width: 280px;
}

.search-input {
  width: 100%;
  border-radius: 8px;
  background-color: #f1f5f9;
  border-color: #e2e8f0;
  font-size: 0.875rem;
}

.search-input:focus {
  background-color: white;
}

.action-btn {
  border-radius: 8px;
  font-weight: 600;
  padding: 0.5rem 1rem;
}

.table-wrapper {
  padding: 0 1rem 1rem 1rem;
}

::ng-deep .custom-table {
  .p-datatable-header {
    background: transparent;
    border: none;
    padding: 1rem;
  }

  .p-datatable-thead > tr > th {
    background: transparent;
    color: #475569;
    font-weight: 600;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    padding: 1rem;
    border-bottom: 2px solid #f1f5f9;
  }

  .p-datatable-tbody > tr {
    transition: background-color 0.2s;
    
    &:hover {
      background-color: #f8fafc;
    }
  }

  .p-datatable-tbody > tr > td {
    padding: 1.25rem 1rem;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
  }

  .p-paginator {
    border: none;
    padding-top: 1rem;
  }
}

.expediente-number {
  font-weight: 700;
  color: #0f172a;
}

.type-badge {
  font-size: 0.75rem;
  background-color: #f1f5f9;
  padding: 2px 8px;
  border-radius: 4px;
  color: #475569;
  font-weight: 600;
}

.juzgado-text {
  color: #334155;
  font-size: 0.875rem;
  line-height: 1.4;
  display: block;
  max-width: 300px;
}

.date-text {
  color: #64748b;
  font-size: 0.875rem;
}

.action-buttons {
  display: flex;
  justify-content: center;
  gap: 4px;
}

.action-icon {
  width: 32px !important;
  height: 32px !important;
}

.empty-msg {
  padding: 3rem !important;
  text-align: center;
  color: #94a3b8;
  font-style: italic;
}

.error-msg {
  display: block;
  margin-top: 1rem;
}

@media (max-width: 768px) {
  .header-actions {
    width: 100%;
    flex-direction: column;
    align-items: stretch;
  }
  
  .search-container {
    width: 100%;
  }
}
</style>
