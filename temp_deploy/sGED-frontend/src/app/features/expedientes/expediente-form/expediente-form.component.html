<p-card [header]="isEditMode() ? 'Editar expediente' : 'Nuevo expediente'">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="expediente-form">
    <div class="form-field">
      <label for="numero">Número de expediente</label>
      <input id="numero" pInputText formControlName="numero" />
      <small class="error" *ngIf="isInvalid('numero')">El número es requerido</small>
    </div>

    <div class="form-field">
      <label for="tipoProcesoId">Tipo de proceso</label>
      <p-select
        id="tipoProcesoId"
        formControlName="tipoProcesoId"
        [options]="tiposProceso"
        optionLabel="nombre"
        optionValue="id"
        placeholder="Seleccione tipo de proceso"
      ></p-select>
      <small class="error" *ngIf="isInvalid('tipoProcesoId')">El tipo es requerido</small>
    </div>

    <div class="form-field">
      <label for="estadoId">Estado</label>
      <p-select
        id="estadoId"
        formControlName="estadoId"
        [options]="estados"
        optionLabel="nombre"
        optionValue="id"
        placeholder="Seleccione estado"
      ></p-select>
      <small class="error" *ngIf="isInvalid('estadoId')">El estado es requerido</small>
    </div>

    <div class="form-field">
      <label for="juzgadoId">Juzgado</label>
      <p-select
        id="juzgadoId"
        formControlName="juzgadoId"
        [options]="juzgados"
        optionLabel="nombre"
        optionValue="id"
        placeholder="Seleccione juzgado"
      ></p-select>
      <small class="error" *ngIf="isInvalid('juzgadoId')">El juzgado es requerido</small>
    </div>

    <div class="form-field">
      <label for="fechaInicio">Fecha de inicio</label>
      <p-datepicker id="fechaInicio" formControlName="fechaInicio" dateFormat="yy-mm-dd"></p-datepicker>
      <small class="error" *ngIf="isInvalid('fechaInicio')">La fecha es requerida</small>
    </div>

    <div class="form-field">
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" pInputTextarea rows="3" formControlName="descripcion"></textarea>
      <small class="error" *ngIf="isInvalid('descripcion')">La descripción es requerida</small>
    </div>

    <div class="form-field">
      <label for="observaciones">Observaciones</label>
      <textarea id="observaciones" pInputTextarea rows="2" formControlName="observaciones"></textarea>
    </div>

    <div class="form-field">
      <label for="referenciaSgt">Referencia SGT</label>
      <input id="referenciaSgt" pInputText formControlName="referenciaSgt" />
    </div>

    <div class="form-field">
      <label for="referenciaFuente">Fuente referencia</label>
      <input id="referenciaFuente" pInputText formControlName="referenciaFuente" />
    </div>

    <div class="messages">
      <p-message *ngIf="successMessage" severity="success" [text]="successMessage"></p-message>
      <p-message *ngFor="let message of errorMessages" severity="error" [text]="message"></p-message>
    </div>

    <div class="form-actions">
      <button pButton type="button" label="Cancelar" class="p-button-text" routerLink="/expedientes"></button>
      <button pButton type="submit" label="Guardar" [loading]="loading" [disabled]="loading"></button>
    </div>
  </form>
</p-card>
