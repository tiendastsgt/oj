<div class="auth-container">
  <p-card header="Cambio de contraseña" styleClass="auth-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-field">
        <label for="passwordActual">Contraseña actual</label>
        <p-password
          id="passwordActual"
          formControlName="passwordActual"
          [feedback]="false"
          toggleMask="true"
          autocomplete="current-password"
        ></p-password>
        <small class="error" *ngIf="isInvalid('passwordActual')">La contraseña actual es requerida</small>
      </div>

      <div class="form-field">
        <label for="passwordNuevo">Nueva contraseña</label>
        <p-password
          id="passwordNuevo"
          formControlName="passwordNuevo"
          [feedback]="false"
          toggleMask="true"
          autocomplete="new-password"
        ></p-password>
        <small class="error" *ngIf="form.get('passwordNuevo')?.touched && form.get('passwordNuevo')?.hasError('required')">
          La nueva contraseña es requerida
        </small>
        <small class="error" *ngIf="form.get('passwordNuevo')?.touched && form.get('passwordNuevo')?.hasError('pattern')">
          Debe tener mínimo 8 caracteres, una mayúscula, una minúscula y un número
        </small>
      </div>

      <div class="form-field">
        <label for="passwordConfirmacion">Confirmar contraseña</label>
        <p-password
          id="passwordConfirmacion"
          formControlName="passwordConfirmacion"
          [feedback]="false"
          toggleMask="true"
          autocomplete="new-password"
        ></p-password>
        <small class="error" *ngIf="isInvalid('passwordConfirmacion')">La confirmación es requerida</small>
        <small class="error" *ngIf="hasPasswordMismatch()">Las contraseñas no coinciden</small>
      </div>

      <p-message *ngIf="successMessage" severity="success" [text]="successMessage"></p-message>
      <p-message
        *ngFor="let message of errorMessages"
        severity="error"
        [text]="message"
      ></p-message>

      <button
        pButton
        type="submit"
        label="Actualizar contraseña"
        [loading]="loading"
        [disabled]="loading"
        class="submit-button"
      ></button>
    </form>
  </p-card>
</div>
