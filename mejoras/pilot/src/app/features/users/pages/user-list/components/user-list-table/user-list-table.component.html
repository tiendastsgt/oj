<!-- ════════════════════════════════════════════════════════════
     user-list-table.component.html
     ════════════════════════════════════════════════════════════ -->

<div class="table-wrapper">
  <table class="users-table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Estado</th>
        <th class="users-table__actions-col">Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (u of users(); track u.id) {
        <tr [class.users-table__row--inactive]="!u.active">
          <td>{{ u.name }}</td>
          <td>{{ u.email }}</td>
          <td>
            <span class="users-table__badge">{{ u.role }}</span>
          </td>
          <td>
            @if (u.active) {
              <span class="users-table__status users-table__status--active">Activo</span>
            } @else {
              <span class="users-table__status users-table__status--inactive">Inactivo</span>
            }
          </td>
          <td class="users-table__actions">
            <button type="button" (click)="editClick.emit(u.id)" title="Ver detalle">
              👁
            </button>
            <button type="button" (click)="toggleClick.emit(u.id)" title="Activar/Desactivar">
              {{ u.active ? '⏸' : '▶' }}
            </button>
            <button
              type="button"
              class="users-table__danger"
              (click)="deleteClick.emit(u.id)"
              title="Eliminar"
            >
              ✕
            </button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" class="users-table__empty">
            No se encontraron usuarios con los filtros aplicados.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
