<div class="card glass-panel p-6 fade-in shadow-md relative overflow-hidden">
  <div class="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-blue-500 via-cyan-400 to-violet-500 opacity-70"></div>
  
  <h3 class="section-title mb-6 text-white"><i class="pi pi-bolt text-primary"></i> BÚSQUEDA RÁPIDA</h3>
  
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-wrap items-end gap-4 mb-6">
    <div class="form-field flex-1 max-w-sm">
      <label for="numero" class="form-label text-slate-400">Número de expediente</label>
      <input id="numero" class="form-input w-full" formControlName="numero" placeholder="Ej. 03002-2025-09821..." />
      <small class="text-rose-400 mt-1 block" *ngIf="form.get('numero')?.touched && form.get('numero')?.invalid">
        El número es requerido
      </small>
    </div>

    <button type="submit" class="btn btn-primary h-[42px]" [disabled]="loading">
      <i class="pi" [ngClass]="loading ? 'pi-spin pi-spinner' : 'pi-search'"></i>
      <span>Buscar</span>
    </button>
  </form>

  <div class="messages mb-4">
    <p-message *ngFor="let message of errorMessages" severity="error" [text]="message"></p-message>
  </div>

  <div class="mt-4 border-t border-white/5 pt-4">
    <app-resultados-busqueda
      [resultados]="resultados"
      [loading]="loading"
      (lazyLoad)="onLazyLoad($event)"
    ></app-resultados-busqueda>
  </div>
</div>
