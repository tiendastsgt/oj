<div class="search-container glass-panel fade-in-up">
  <div class="search-header">
    <h2>Búsqueda Avanzada</h2>
    <p class="subtitle">Encuentre expedientes filtrando por múltiples criterios</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="search-form">
    
    <!-- Sección: Criterios Generales -->
    <div class="filter-section">
      <h3 class="section-title"><i class="pi pi-folder"></i> Criterios Generales</h3>
      <app-criterios-generales 
        [formGroup]="form"
        [tiposProceso]="tiposProceso"
        [estados]="estados"
        [juzgados]="juzgados">
      </app-criterios-generales>
    </div>

    <!-- Sección: Fechas -->
    <div class="filter-section">
      <h3 class="section-title"><i class="pi pi-calendar"></i> Fechas</h3>
      <app-criterios-fechas [formGroup]="form"></app-criterios-fechas>
    </div>

    <!-- Sección: Sujetos Procesales -->
    <div class="filter-section">
      <h3 class="section-title"><i class="pi pi-users"></i> Sujetos Procesales</h3>
      <app-criterios-sujetos [formGroup]="form"></app-criterios-sujetos>
    </div>

    <!-- Sección: Referencias -->
    <div class="filter-section">
      <h3 class="section-title"><i class="pi pi-link"></i> Referencias SGT</h3>
      <app-criterios-referencia [formGroup]="form"></app-criterios-referencia>
    </div>

    <!-- Acciones -->
    <div class="form-actions">
      <button 
        pButton 
        type="submit" 
        label="Buscar Expedientes" 
        icon="pi pi-search" 
        class="p-button-primary btn-neon"
        [loading]="loading">
      </button>
    </div>
  </form>

  <div class="messages-container" *ngIf="errorMessages.length > 0">
    <p-message *ngFor="let message of errorMessages" severity="error" [text]="message" styleClass="w-full"></p-message>
  </div>
</div>

<div class="results-container slide-up" *ngIf="resultados">
  <app-resultados-busqueda
    [resultados]="resultados"
    [loading]="loading"
    (lazyLoad)="onLazyLoad($event)"
  ></app-resultados-busqueda>
</div>
