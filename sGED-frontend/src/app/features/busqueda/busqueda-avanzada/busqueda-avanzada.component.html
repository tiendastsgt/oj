<div class="fade-in">
  <!-- Hero Search Section (Elite UX v2.0) -->
  <div class="card glass-panel mb-8 p-1">
    <div class="search-hero-bar">
      <i class="pi pi-search search-icon"></i>
      <input 
        type="text" 
        class="search-hero-input" 
        [formControl]="form.get('numero')"
        placeholder="Buscar expedientes (Número, Partes, Palabras clave...)"
        (keyup.enter)="onSubmit()"
      />
      <button 
        type="button"
        class="btn btn-primary btn-sm"
        (click)="showAdvancedFilters = !showAdvancedFilters"
      >
        <i class="pi" [ngClass]="showAdvancedFilters ? 'pi-chevron-up' : 'pi-chevron-down'"></i>
        {{ showAdvancedFilters ? 'OCULTAR FILTROS' : 'MÁS FILTROS' }}
      </button>
    </div>

    <!-- Advanced Panel (Elite UX v2.0) -->
    <div 
      class="advanced-panel" 
      [style.max-height]="showAdvancedFilters ? '1000px' : '0'"
      [style.opacity]="showAdvancedFilters ? '1' : '0'"
      [style.padding]="showAdvancedFilters ? 'var(--space-6)' : '0'"
      style="overflow: hidden; transition: all 0.4s var(--ease-spring);"
    >
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <!-- General Criteria -->
        <div class="criteria-section">
          <div class="criteria-section-title"><i class="pi pi-filter"></i> CRITERIOS GENERALES</div>
          <div class="grid-3">
            <div class="form-field">
              <label class="form-label"><i class="pi pi-database"></i> Origen de Datos</label>
              <select formControlName="fuente" class="form-input form-select">
                <option value="TODOS">Todas las fuentes</option>
                <option value="LOCAL">Expedientes Digitales (Local)</option>
                <option value="SGTV1">Histórico SGT v1</option>
                <option value="SGTV2">Sistema SGT v2</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-label"><i class="pi pi-building"></i> Juzgado / Corte</label>
              <p-select 
                [options]="juzgados" 
                formControlName="juzgadoId"
                optionLabel="nombre" 
                optionValue="id"
                placeholder="Todos los Juzgados"
                styleClass="w-full elite-select"
                [filter]="true"
              ></p-select>
            </div>
            <div class="form-field">
              <label class="form-label"><i class="pi pi-list"></i> Tipo de Proceso</label>
              <p-select 
                [options]="tiposProceso" 
                formControlName="tipoProcesoId"
                optionLabel="descripcion" 
                optionValue="id"
                placeholder="Todos los Procesos"
                styleClass="w-full elite-select"
              ></p-select>
            </div>
          </div>
        </div>

        <!-- Dates & Reference -->
        <div class="grid-2 criteria-section">
          <div class="form-field">
            <div class="criteria-section-title"><i class="pi pi-calendar"></i> RANGO DE FECHAS</div>
            <div class="flex gap-4">
              <p-datepicker formControlName="fechaDesde" placeholder="Desde" dateFormat="dd/mm/yy" class="flex-1"></p-datepicker>
              <p-datepicker formControlName="fechaHasta" placeholder="Hasta" dateFormat="dd/mm/yy" class="flex-1"></p-datepicker>
            </div>
          </div>
          <div class="form-field">
            <div class="criteria-section-title"><i class="pi pi-link"></i> REFERENCIA EXTERNA</div>
            <input type="text" pInputText formControlName="referenciaSgt" placeholder="Ref. SGT o Código anterior" class="form-input" />
          </div>
        </div>

        <!-- Subjects -->
        <div class="criteria-section">
          <div class="criteria-section-title"><i class="pi pi-users"></i> PARTES PROCESALES</div>
          <div class="grid-2">
            <div class="form-field">
              <label class="form-label">Actor / Demandante</label>
              <input type="text" pInputText formControlName="actorPrincipal" placeholder="Nombre completo" class="form-input" />
            </div>
            <div class="form-field">
              <label class="form-label">Demandado</label>
              <input type="text" pInputText formControlName="demandadoPrincipal" placeholder="Nombre completo" class="form-input" />
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-3 pt-6 border-t border-white/5 mt-6">
          <button 
            type="button" 
            class="btn btn-secondary"
            (click)="form.reset({fuente: 'TODOS'})"
          >
            <i class="pi pi-refresh"></i> Limpiar
          </button>
          <button 
            type="submit" 
            class="btn btn-primary"
            [disabled]="loading"
          >
            <i class="pi" [ngClass]="loading ? 'pi-spin pi-spinner' : 'pi-search'"></i>
            EJECUTAR BÚSQUEDA
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Results Section -->
  <div class="slide-up" *ngIf="resultados">
    <div class="flex justify-between items-baseline mb-4">
      <h3 class="section-title"><i class="pi pi-list"></i> RESULTADOS DE BÚSQUEDA</h3>
      <span class="text-xs text-slate-500 font-bold uppercase tracking-wider">{{ resultados.totalElements }} expedientes encontrados</span>
    </div>
    
    <div class="card glass-panel shadow-sm">
      <app-resultados-busqueda
        [resultados]="resultados"
        [loading]="loading"
        (lazyLoad)="onLazyLoad($event)"
      ></app-resultados-busqueda>
    </div>
  </div>

  <!-- Empty State Search -->
  <div class="py-20 text-center" *ngIf="!resultados && !loading">
    <div class="w-24 h-24 rounded-full bg-primary-light flex items-center justify-center mx-auto mb-6">
      <i class="pi pi-search text-4xl text-primary-hover"></i>
    </div>
    <h3 class="text-white font-bold text-xl">Inicie una búsqueda</h3>
    <p class="text-slate-500 max-w-md mx-auto mt-2">Ingrese un número de expediente o utilice los filtros avanzados para localizar información histórico-judicial.</p>
  </div>
</div>
