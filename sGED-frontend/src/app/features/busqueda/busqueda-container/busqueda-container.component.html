<div class="search-page-header">
  <h1 class="page-title">Búsqueda Avanzada</h1>
</div>

<div class="search-tabs">
  <div
    class="search-tab"
    [class.active]="activeTab === 'rapida'"
    (click)="setActiveTab('rapida')"
  >
    <i class="pi pi-bolt"></i> Búsqueda Rápida
  </div>
  <div
    class="search-tab"
    [class.active]="activeTab === 'avanzada'"
    (click)="setActiveTab('avanzada')"
  >
    <i class="pi pi-sliders-h"></i> Búsqueda Avanzada
  </div>
</div>

<div class="search-content">
  @if (activeTab === 'rapida') {
  <app-busqueda-rapida></app-busqueda-rapida>
  }
  @if (activeTab === 'avanzada') {
  <app-busqueda-avanzada></app-busqueda-avanzada>
  }
</div>
