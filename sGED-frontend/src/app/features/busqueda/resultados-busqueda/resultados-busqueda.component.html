<div class="px-0">
  <p-table
    [value]="resultados?.content ?? []"
    [lazy]="true"
    [paginator]="true"
    [rows]="rows"
    [first]="first"
    [totalRecords]="totalRecords"
    [loading]="loading"
    [rowsPerPageOptions]="[10, 25, 50]"
    (onLazyLoad)="lazyLoad.emit($event)"
    sortField="fechaUltimoMovimiento"
    sortOrder="-1"
    styleClass="p-datatable-sm"
    [responsiveLayout]="'scroll'"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="numero" style="width: 20%">NÚMERO <p-sortIcon field="numero"></p-sortIcon></th>
        <th style="width: 20%">JUZGADO</th>
        <th style="width: 12%">ESTADO</th>
        <th style="width: 15%">TIPO PROCESO</th>
        <th pSortableColumn="fechaUltimoMovimiento" style="width: 18%">ULT. MOVIMIENTO <p-sortIcon field="fechaUltimoMovimiento"></p-sortIcon></th>
        <th style="width: 10%">FUENTE</th>
        <th style="text-align: center; width: 5%">ACCIONES</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr class="hover:bg-primary-light transition-colors cursor-default">
        <td>
          <a [routerLink]="['/expedientes', row.id]" class="font-bold text-blue-400 hover:text-cyan-400">
            {{ row.numero }}
          </a>
        </td>
        <td class="text-xs text-slate-400">{{ row.juzgado }}</td>
        <td>
          <app-status-badge [status]="row.estadoId"></app-status-badge>
        </td>
        <td class="text-xs">{{ row.tipoProceso }}</td>
        <td><span class="text-sm text-slate-500">{{ row.fechaUltimoMovimiento | date: 'dd MMM, yyyy' }}</span></td>
        <td>
          <span class="badge" [ngClass]="row.fuente === 'LOCAL' ? 'badge-info' : 'badge-pending'">
            {{ row.fuente }}
          </span>
        </td>
        <td class="text-center">
          <button
            pButton
            type="button"
            icon="pi pi-eye"
            class="p-button-text p-button-rounded p-button-info"
            *ngIf="canNavigate(row)"
            [routerLink]="['/expedientes', row.id]"
            pTooltip="Ver detalle"
          ></button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="py-12 text-center text-slate-500 italic">No se encontraron expedientes con los criterios ingresados.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<div class="messages">
  <p-message *ngFor="let message of errorMessages" severity="error" [text]="message"></p-message>
</div>
