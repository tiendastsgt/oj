<div class="elite-viewer" *ngIf="documento">
  <!-- Visor de PDF / Word (Como PDF) -->
  <div class="viewer-content pdf-viewer" *ngIf="isPdf || isWord">
    <iframe [src]="inlineUrl" class="viewer-iframe" title="Visor PDF"></iframe>
  </div>

  <!-- Visor de Imágenes -->
  <div class="viewer-content image-viewer" *ngIf="isImage">
    <div class="image-flex-container">
      <img [src]="inlineUrl" [alt]="documento.nombre" class="img-fluid rounded-lg shadow-md" />
    </div>
  </div>

  <!-- Reproductor de Audio (F04) -->
  <div class="viewer-content audio-viewer" *ngIf="isAudio">
    <div class="multimedia-wrapper">
      <div class="player-icon"><i class="pi pi-volume-up"></i></div>
      <audio controls autoplay class="w-full elite-audio-player">
        <source [src]="inlineUrl" [type]="'audio/' + (documento.extension === 'mp3' ? 'mpeg' : documento.extension)">
        Su navegador no soporta la reproducción de audio.
      </audio>
      <p class="text-xs text-slate-400 mt-4">Reproductor Élite — Formato compatible HTML5</p>
    </div>
  </div>

  <!-- Reproductor de Video (F04) -->
  <div class="viewer-content video-viewer" *ngIf="isVideo">
    <div class="multimedia-wrapper">
      <video controls autoplay class="w-full rounded-xl shadow-2xl elite-video-player">
        <source [src]="inlineUrl" [type]="'video/' + documento.extension">
        Su navegador no soporta la reproducción de video.
      </video>
    </div>
  </div>

  <!-- Formato No Soportado -->
  <div class="viewer-content unsupported-viewer" *ngIf="!isPdf && !isWord && !isImage && !isAudio && !isVideo">
    <div class="text-center py-10">
      <i class="pi pi-exclamation-triangle text-4xl text-amber-500 mb-4"></i>
      <h4 class="font-bold">Formato no visualizable directamente</h4>
      <p class="text-sm text-slate-500 mb-6">Este archivo debe descargarse para ser visualizado.</p>
      <button pButton icon="pi pi-download" label="Descargar Archivo" class="p-button-outlined" (click)="download()"></button>
    </div>
  </div>
</div>
