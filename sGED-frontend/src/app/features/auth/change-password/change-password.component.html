<div class="fade-in max-w-lg mx-auto py-12">
  <div class="card glass-panel shadow-2xl p-8">
    <div class="mb-8 text-center">
      <div class="brand-icon mx-auto mb-4" style="width: 48px; height: 48px; font-size: 1.25rem;">OJ</div>
      <h2 class="text-2xl font-bold text-white mb-2">Seguridad de la Cuenta</h2>
      <p class="text-sm text-slate-500">Actualice su contraseña para mantener el acceso seguro.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      <div class="form-field">
        <label class="form-label" for="passwordActual">Contraseña actual</label>
        <p-password
          id="passwordActual"
          formControlName="passwordActual"
          [feedback]="false"
          toggleMask="true"
          autocomplete="current-password"
          styleClass="w-full elite-password"
        ></p-password>
        <small class="text-rose-500 block mt-1 font-bold text-xs" *ngIf="isInvalid('passwordActual')">La contraseña actual es requerida</small>
      </div>

      <div class="form-field">
        <label class="form-label" for="passwordNuevo">Nueva contraseña</label>
        <p-password
          id="passwordNuevo"
          formControlName="passwordNuevo"
          [feedback]="false"
          toggleMask="true"
          autocomplete="new-password"
          styleClass="w-full elite-password"
        ></p-password>
        <small class="text-rose-500 block mt-1 font-bold text-xs" *ngIf="form.get('passwordNuevo')?.touched && form.get('passwordNuevo')?.hasError('required')">
          La nueva contraseña es requerida
        </small>
        <small class="text-amber-500 block mt-1 font-bold text-xs" *ngIf="form.get('passwordNuevo')?.touched && form.get('passwordNuevo')?.hasError('pattern')">
          Requiere 8+ caracteres, Mayúscula, Minúscula y Número
        </small>
      </div>

      <div class="form-field">
        <label class="form-label" for="passwordConfirmacion">Confirmar contraseña</label>
        <p-password
          id="passwordConfirmacion"
          formControlName="passwordConfirmacion"
          [feedback]="false"
          toggleMask="true"
          autocomplete="new-password"
          styleClass="w-full elite-password"
        ></p-password>
        <small class="text-rose-500 block mt-1 font-bold text-xs" *ngIf="isInvalid('passwordConfirmacion')">La confirmación es requerida</small>
        <small class="text-rose-500 block mt-1 font-bold text-xs" *ngIf="hasPasswordMismatch()">Las contraseñas no coinciden</small>
      </div>

      <div class="flex flex-col gap-3 mt-4">
        <p-message *ngIf="successMessage" severity="success" [text]="successMessage" styleClass="w-full"></p-message>
        <p-message *ngFor="let message of errorMessages" severity="error" [text]="message" styleClass="w-full"></p-message>
      </div>

      <button
        type="submit"
        class="btn btn-primary w-full py-4 text-base tracking-widest uppercase font-bold"
        [disabled]="loading || form.invalid"
      >
        <i class="pi mr-2" [ngClass]="loading ? 'pi-spin pi-spinner' : 'pi-shield'"></i>
        Actualizar Datos
      </button>
    </form>
  </div>
</div>
