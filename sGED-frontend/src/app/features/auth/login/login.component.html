<div class="login-container">
  <!-- Fondo con gradiente dinámico y formas abstractas -->
  <div class="glass-background">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="login-overlay">
    <div class="login-card glass-panel">
      <div class="login-header">
        <div class="logo-wrapper">
          <i class="pi pi-shield logo-icon"></i>
        </div>
        <h1>sGED <span class="accent">Elite</span></h1>
        <p class="subtitle">Justicia Digital de Próxima Generación</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <div class="input-group">
          <label for="username">Nombre de Usuario</label>
          <div class="input-wrapper">
            <i class="pi pi-user input-icon"></i>
            <input
              id="username"
              type="text"
              pInputText
              formControlName="username"
              autocomplete="username"
              placeholder="Ingrese su usuario"
              [class.ng-invalid]="isInvalid('username')"
              [class.ng-dirty]="isInvalid('username')"
            />
          </div>
          <small class="error-text" *ngIf="isInvalid('username')">El usuario es requerido</small>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="pi pi-lock input-icon"></i>
            <p-password
              id="password"
              formControlName="password"
              [feedback]="false"
              [toggleMask]="true"
              autocomplete="current-password"
              placeholder="••••••••"
              styleClass="w-full"
              inputStyleClass="w-full"
              [class.ng-invalid]="isInvalid('password')"
              [class.ng-dirty]="isInvalid('password')"
            ></p-password>
          </div>
          <small class="error-text" *ngIf="isInvalid('password')">La contraseña es requerida</small>
        </div>

        <div class="error-container" *ngIf="errorMessage">
          <i class="pi pi-exclamation-circle"></i>
          <span>{{ errorMessage }}</span>
        </div>

        <button
          pButton
          type="submit"
          [loading]="loading"
          [disabled]="loading"
          class="login-button"
        >
          <span class="button-content">
            Confirmar Acceder
            <i class="pi pi-arrow-right"></i>
          </span>
        </button>
      </form>

      <div class="login-footer">
        <p>© 2026 Organismo Judicial de Guatemala</p>
        <span class="version">v1.2.0</span>
      </div>
    </div>
  </div>
</div>
