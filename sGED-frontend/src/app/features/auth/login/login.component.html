<div class="login-wrapper elite-theme">
  <div class="login-content fade-in">
    
    <div class="brand-header">
      <div class="elite-shield">
        <i class="pi pi-shield"></i>
      </div>
      <h1>sGED <span class="accent-text">Elite</span></h1>
      <p class="tagline">Justicia Digital de Próxima Generación</p>
    </div>

    <div class="login-card glass-panel">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="elite-form">
        
        <div class="field-container">
          <label for="username">Nombre de Usuario</label>
          <div class="p-input-icon-left w-full">
            <i class="pi pi-user"></i>
            <input
              id="username"
              type="text"
              pInputText
              formControlName="username"
              placeholder="Ingrese su usuario"
              class="w-full"
              [class.ng-invalid]="isInvalid('username')"
            />
          </div>
        </div>

        <div class="field-container">
          <label for="password">Contraseña</label>
          <div class="p-input-icon-left w-full">
            <i class="pi pi-lock"></i>
            <p-password
              id="password"
              formControlName="password"
              [feedback]="false"
              [toggleMask]="true"
              placeholder="••••••••"
              styleClass="w-full"
              inputStyleClass="w-full"
              [class.ng-invalid]="isInvalid('password')"
            ></p-password>
          </div>
        </div>

        <div class="error-msg" *ngIf="errorMessage">
          <i class="pi pi-exclamation-triangle"></i>
          <span>{{ errorMessage }}</span>
        </div>

        <button
          pButton
          type="submit"
          class="p-button-lg elite-submit-btn w-full"
          [loading]="loading"
        >
          <span class="btn-text">Confirmar Acceder</span>
          <i class="pi pi-arrow-right"></i>
        </button>
      </form>
    </div>

    <footer class="login-footer">
      <p>© 2026 Organismo Judicial de Guatemala</p>
      <span class="v-tag">v1.2.0</span>
    </footer>
  </div>
</div>
