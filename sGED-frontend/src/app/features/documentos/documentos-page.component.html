<section class="documentos-page">
  <h2>Documentos del expediente</h2>

  <app-documentos-upload
    [expedienteId]="expedienteId"
    (uploaded)="onUploaded()"
  ></app-documentos-upload>

  @if (loading) {
  <p>Cargando documentos...</p>
  }
  @if (errorMessage) {
  <p class="error">{{ errorMessage }}</p>
  }

  <app-documentos-list
    [documentos]="documentos"
    (ver)="onVer($event)"
    (descargar)="onDescargar($event)"
    (imprimir)="onImprimir($event)"
    (eliminar)="onEliminar($event)"
  ></app-documentos-list>

  <p-dialog [visible]="viewerType !== null" [modal]="true" [maximizable]="true" [style]="{width: '85vw', height: '85vh'}" (onHide)="cerrarVisor()" header="{{ selectedDocumento?.nombreOriginal || 'Visor de Documentos' }}">
    <div class="visor-content" style="height: 100%; display: flex; flex-direction: column;">
      @if (viewerType === 'PDF' || viewerType === 'WORD') {
      <app-visor-pdf [url]="viewerUrl"></app-visor-pdf>
      }
      @if (viewerType === 'IMAGEN') {
      <app-visor-imagen [url]="viewerUrl"></app-visor-imagen>
      }
      @if (viewerType === 'AUDIO') {
      <app-reproductor-audio [url]="viewerUrl"></app-reproductor-audio>
      }
      @if (viewerType === 'VIDEO') {
      <app-reproductor-video [url]="viewerUrl"></app-reproductor-video>
      }
    </div>
  </p-dialog>
</section>
