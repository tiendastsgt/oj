<section class="documentos-page">
  <h2>Documentos del expediente</h2>

  <app-documentos-upload
    [expedienteId]="dto.expedienteId()"
    (uploaded)="svc.onUploaded()"
  ></app-documentos-upload>

  @if (dto.isLoading()) {
    <p>Cargando documentos...</p>
  }
  @if (dto.hasError()) {
    <p class="error">{{ dto.errorMessage() }}</p>
  }

  <app-documentos-list
    [documentos]="dto.documentos()"
    (ver)="svc.onVer($event)"
    (descargar)="svc.onDescargar($event)"
    (imprimir)="svc.onImprimir($event)"
    (eliminar)="svc.onEliminar($event)"
  ></app-documentos-list>

  <p-dialog
    [visible]="dto.viewerVisible()"
    [modal]="true"
    [maximizable]="true"
    [style]="{width: '85vw', height: '85vh'}"
    [header]="dto.viewerTitle()"
    (onHide)="svc.cerrarVisor()"
  >
    <div class="visor-content">
      @if (dto.showPdfViewer()) {
        <app-visor-pdf [url]="dto.viewerUrl()"></app-visor-pdf>
      }
      @if (dto.showImageViewer()) {
        <app-visor-imagen [url]="dto.viewerUrl()"></app-visor-imagen>
      }
      @if (dto.showAudioPlayer()) {
        <app-reproductor-audio [url]="dto.viewerUrl()"></app-reproductor-audio>
      }
      @if (dto.showVideoPlayer()) {
        <app-reproductor-video [url]="dto.viewerUrl()"></app-reproductor-video>
      }
    </div>
  </p-dialog>
</section>
