<table class="documentos-table" *ngIf="documentos.length">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Categoría</th>
      <th>Tamaño</th>
      <th>Usuario</th>
      <th>Fecha</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let doc of documentos">
      <td>{{ doc.nombreOriginal }}</td>
      <td>{{ doc.categoria }}</td>
      <td>{{ doc.tamanio | number }} bytes</td>
      <td>{{ doc.usuarioCreacion }}</td>
      <td>{{ doc.fechaCreacion | date: 'short' }}</td>
      <td>
        <div class="documentos-actions">
          <button type="button" (click)="ver.emit(doc)">Ver</button>
          <button type="button" (click)="descargar.emit(doc)">Descargar</button>
          <button type="button" (click)="imprimir.emit(doc)">Imprimir</button>
          <button type="button" (click)="eliminar.emit(doc)">Eliminar</button>
        </div>
      </td>
    </tr>
  </tbody>
</table>

<p *ngIf="!documentos.length">No hay documentos cargados.</p>
