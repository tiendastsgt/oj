@if (documentos.length) {
  <p-table [value]="documentos" [tableStyle]="{'min-width': '640px'}">
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Categoría</th>
        <th>Tamaño</th>
        <th>Usuario</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-doc>
      <tr>
        <td>{{ doc.nombreOriginal }}</td>
        <td>{{ doc.categoria }}</td>
        <td>{{ doc.tamanio | fileSize }}</td>
        <td>{{ doc.usuarioCreacion }}</td>
        <td>{{ doc.fechaCreacion | date: 'dd/MM/yyyy' }}</td>
        <td>
          <div class="doc-actions">
            <p-button icon="pi pi-eye" severity="secondary" [text]="true" [rounded]="true"
              pTooltip="Ver" aria-label="Ver documento"
              (onClick)="ver.emit(doc)" />
            <p-button icon="pi pi-download" severity="info" [text]="true" [rounded]="true"
              pTooltip="Descargar" aria-label="Descargar documento"
              (onClick)="descargar.emit(doc)" />
            <p-button icon="pi pi-print" severity="secondary" [text]="true" [rounded]="true"
              pTooltip="Imprimir" aria-label="Imprimir documento"
              (onClick)="imprimir.emit(doc)" />
            <p-button icon="pi pi-trash" severity="danger" [text]="true" [rounded]="true"
              pTooltip="Eliminar" aria-label="Eliminar documento"
              (onClick)="eliminar.emit(doc)" />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
} @else {
  <app-empty-state
    icon="pi pi-file"
    titulo="Sin documentos"
    mensaje="Aún no hay documentos cargados."
  />
}
