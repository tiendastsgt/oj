<ng-container *ngIf="(currentUser$ | async) as user; else loginLayout">
  <div class="app-layout elite-theme">
    <aside class="app-sidebar glass-panel fade-in">
      <div class="sidebar-header">
        <div class="elite-logo">
          <i class="pi pi-shield"></i>
        </div>
        <div class="brand-text">
          <span class="brand-name">sGED <span class="accent-text">Elite</span></span>
          <span class="brand-tagline">Judicial System</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a routerLink="/expedientes" routerLinkActive="active" class="nav-item">
          <i class="pi pi-folder"></i>
          <span>Expedientes</span>
        </a>
        <a routerLink="/busqueda" routerLinkActive="active" class="nav-item">
          <i class="pi pi-search"></i>
          <span>Búsqueda</span>
        </a>
        <a *ngIf="user.rol === 'ADMIN'" routerLink="/admin" routerLinkActive="active" class="nav-item">
          <i class="pi pi-chart-bar"></i>
          <span>Panel Auditoría</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-strip">
          <div class="u-avatar">{{ user.nombreCompleto.charAt(0) | uppercase }}</div>
          <div class="u-info">
            <span class="u-name">{{ user.nombreCompleto }}</span>
            <span class="u-role">Portal {{ user.rol }}</span>
          </div>
        </div>
        <button pButton type="button" icon="pi pi-power-off" class="p-button-text logout-btn" (click)="onLogout()" title="Cerrar sesión"></button>
      </div>
    </aside>

    <main class="app-main">
      <div class="top-blur"></div>
      <div class="content-viewport">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</ng-container>

<ng-template #loginLayout>
  <router-outlet></router-outlet>
</ng-template>
