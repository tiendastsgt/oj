<ng-container *ngIf="(currentUser$ | async) as user; else loginLayout">
  <div class="app-shell">
    <!-- Sidebar: Icon-based Dark Navigation -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">OJ</div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" title="Dashboard">
            <i class="pi pi-th-large"></i>
          </a>
          <a routerLink="/expedientes" routerLinkActive="active" class="nav-item" title="Expedientes">
            <i class="pi pi-folder"></i>
          </a>
          <a routerLink="/busqueda" routerLinkActive="active" class="nav-item" title="Búsqueda">
            <i class="pi pi-search"></i>
          </a>
        </div>

        <div class="nav-section" *ngIf="user.rol === 'ADMIN' || user.rol === 'ADMINISTRADOR'">
          <a routerLink="/admin/usuarios" routerLinkActive="active" class="nav-item" title="Usuarios">
            <i class="pi pi-users"></i>
          </a>
          <a routerLink="/admin/auditoria" routerLinkActive="active" class="nav-item" title="Auditoría">
            <i class="pi pi-history"></i>
          </a>
        </div>

        <div class="nav-section">
          <a routerLink="/cambiar-password" routerLinkActive="active" class="nav-item" title="Configuración">
            <i class="pi pi-cog"></i>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn" (click)="onLogout()" title="Cerrar Sesión">
          <i class="pi pi-sign-out"></i>
        </button>
      </div>
    </aside>

    <div class="main-content">
      <!-- Topbar: Glass Dark -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-brand-text">
            <span class="brand-bold">SGED</span>
            <span class="brand-light">Visor Documental</span>
          </div>

          <!-- F05: Búsqueda Rápida -->
          <div class="rapid-search p-input-icon-left">
            <i class="pi pi-search"></i>
            <input
              type="text"
              pInputText
              placeholder="Nro. Expediente..."
              class="rapid-search-input"
              (keyup.enter)="onRapidSearch($event)"
            />
          </div>
        </div>

        <div class="topbar-right">
          <button class="btn-icon" pTooltip="Notificaciones"><i class="pi pi-bell"></i></button>
          <div class="flex items-center gap-3">
            <div class="user-avatar">{{ user.nombreCompleto.charAt(0) | uppercase }}</div>
            <div>
              <div class="user-info-name">{{ user.nombreCompleto }}</div>
              <div class="user-info-role">{{ user.rol }}</div>
            </div>
          </div>
        </div>
      </header>

      <main class="page-content fade-in">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</ng-container>

<ng-template #loginLayout>
  <router-outlet></router-outlet>
</ng-template>
