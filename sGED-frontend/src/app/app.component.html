<ng-container *ngIf="(currentUser$ | async) as user; else loginLayout">
  <div class="app-layout">
    <aside class="app-sidebar glass-panel">
      <div class="sidebar-header">
        <div class="logo-box">
          <i class="pi pi-box"></i>
        </div>
        <span class="app-title">sGED Elite</span>
      </div>

      <nav class="sidebar-nav">
        <a routerLink="/expedientes" routerLinkActive="active" class="nav-item">
          <i class="pi pi-folder"></i>
          <span>Expedientes</span>
        </a>
        <a routerLink="/busqueda" routerLinkActive="active" class="nav-item">
          <i class="pi pi-search"></i>
          <span>Búsqueda</span>
        </a>
        <a *ngIf="user.rol === 'ADMIN'" routerLink="/admin" routerLinkActive="active" class="nav-item">
          <i class="pi pi-cog"></i>
          <span>Administración</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar">{{ user.nombreCompleto.charAt(0) | uppercase }}</div>
          <div class="user-details">
            <span class="user-name">{{ user.nombreCompleto }}</span>
            <span class="user-role">{{ user.rol }}</span>
          </div>
        </div>
        <button pButton type="button" icon="pi pi-sign-out" class="p-button-text p-button-rounded logout-btn" (click)="onLogout()" title="Cerrar sesión"></button>
      </div>
    </aside>

    <main class="app-main">
      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</ng-container>

<ng-template #loginLayout>
  <router-outlet></router-outlet>
</ng-template>
