version: '3.8'

services:
  auth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=${API_PORT:-8005}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8005:8005"
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro # Desarrollo: montar código para hot-reload
      - ./logs:/app/logs
    networks:
      - auth-net

networks:
  auth-net:
    driver: bridge
