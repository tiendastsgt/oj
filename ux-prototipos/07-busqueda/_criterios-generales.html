<div class="criteria-section">
  <div class="criteria-section-title"><i class="pi pi-filter"></i> CRITERIOS GENERALES</div>
  <div class="criteria-grid">
    <div class="form-field">
      <label class="form-label"><i class="pi pi-hashtag"></i> Número de Expediente</label>
      <input type="text" class="form-input" placeholder="Ej: NAZ-2024-00847">
    </div>
    <div class="form-field">
      <label class="form-label"><i class="pi pi-list"></i> Tipo de Proceso</label>
      <select class="form-input form-select">
        <option value="">Todos los Procesos</option>
        <option>Protección</option>
        <option>Conflicto con la Ley Penal</option>
        <option>Adopción</option>
        <option>Familia</option>
      </select>
    </div>
    <div class="form-field">
      <label class="form-label"><i class="pi pi-info-circle"></i> Estado</label>
      <select class="form-input form-select">
        <option value="">Todos los Estados</option>
        <option>Activo</option>
        <option>En trámite</option>
        <option>Resuelto</option>
        <option>Archivado</option>
      </select>
    </div>
    <div class="form-field">
      <label class="form-label"><i class="pi pi-building"></i> Juzgado Asignado</label>
      <select class="form-input form-select">
        <option value="">Todos los Juzgados</option>
        <option>Juzgado 1ro Niñez</option>
        <option>Juzgado 2do Niñez</option>
        <option>Juzgado 3ro Niñez</option>
        <option>Juzgado Adolescentes</option>
      </select>
    </div>
  </div>
</div>
