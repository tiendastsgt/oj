<!-- Barra superior con breadcrumb y usuario     -->
<!-- ============================================ -->
<header class="topbar">
  <div class="topbar-left">
    <button class="btn-icon" title="Menú">
      <i class="pi pi-bars"></i>
    </button>
    <div class="topbar-breadcrumb">
      <span>SGED</span>
      <i class="pi pi-chevron-right" style="font-size: 0.6rem;"></i>
      <!-- Cambiar dinámicamente según la página -->
      <span class="current">Dashboard</span>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-icon" title="Notificaciones">
      <i class="pi pi-bell"></i>
    </button>
    <div class="flex items-center gap-3">
      <div class="user-avatar">AG</div>
      <div style="line-height: 1.3;">
        <div style="font-size: var(--font-sm); font-weight: 600;">Amilcar Gil</div>
        <div style="font-size: var(--font-xs); color: var(--text-muted);">Administrador</div>
      </div>
    </div>
  </div>
</header>
