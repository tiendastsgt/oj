<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGED — Layout Shell</title>
  <link rel="stylesheet" href="../css/elite-design-system.css">
</head>
<body>
  <div class="app-shell">

    <!-- ============================================ -->
    <!-- SIDEBAR: Icon-based dark navigation          -->
    <!-- ============================================ -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">OJ</div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <a href="../03-dashboard/dashboard-page.html" class="nav-item active" title="Dashboard">
            <i class="pi pi-th-large"></i>
          </a>
          <a href="../04-expedientes-list/expedientes-list-page.html" class="nav-item" title="Expedientes">
            <i class="pi pi-folder"></i>
          </a>
          <a href="../07-busqueda/busqueda-container-page.html" class="nav-item" title="Búsqueda">
            <i class="pi pi-search"></i>
          </a>
        </div>

        <div class="nav-section">
          <a href="../08-admin-usuarios/usuarios-list-page.html" class="nav-item" title="Usuarios">
            <i class="pi pi-users"></i>
          </a>
          <a href="../09-auditoria/auditoria-page.html" class="nav-item" title="Auditoría">
            <i class="pi pi-history"></i>
          </a>
        </div>

        <div class="nav-section">
          <a href="../10-cambiar-password/cambiar-password-page.html" class="nav-item" title="Configuración">
            <i class="pi pi-cog"></i>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <a href="../01-login/login-page.html" class="nav-item" title="Cerrar Sesión" style="width:44px;height:44px;">
          <i class="pi pi-sign-out"></i>
        </a>
      </div>
    </aside>

    <!-- ============================================ -->
    <!-- MAIN CONTENT AREA                           -->
    <!-- ============================================ -->
    <div class="main-content">

      <!-- TOPBAR (Glass Dark) -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-brand-text">
            <span class="brand-bold">SGED</span>
            <span class="brand-light">Visor Documental</span>
          </div>

          <div class="topbar-search">
            <i class="pi pi-search"></i>
            <input type="text" placeholder="Nro. Expediente...">
          </div>
        </div>
        <div class="topbar-right">
          <button class="btn-icon" title="Notificaciones"><i class="pi pi-bell"></i></button>
          <div class="flex items-center gap-3">
            <div class="user-avatar">AG</div>
            <div>
              <div class="user-info-name">Amilcar Gil</div>
              <div class="user-info-role">Administrador</div>
            </div>
          </div>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <main class="page-content fade-in">
        <div style="text-align: center; padding: 6rem 2rem; color: var(--text-muted);">
          <i class="pi pi-inbox" style="font-size: 4rem; opacity: 0.3;"></i>
          <p style="margin-top: var(--space-4); font-size: var(--font-lg);">Selecciona una sección del menú lateral</p>
        </div>
      </main>
    </div>

  </div>
</body>
</html>
