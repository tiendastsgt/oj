<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGED — Layout Shell</title>
  <link rel="stylesheet" href="../css/elite-design-system.css">
</head>
<body>
  <div class="app-shell">

    <!-- ============================================ -->
    <!-- COMPONENTE: _sidebar-nav.html               -->
    <!-- ============================================ -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-name gradient-text">SGED</div>
        <div class="brand-sub">Visor Documental — OJ</div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Principal</div>
          <a href="../03-dashboard/dashboard-page.html" class="nav-item active">
            <i class="pi pi-th-large"></i>
            <span>Dashboard</span>
          </a>
          <a href="../04-expedientes-list/expedientes-list-page.html" class="nav-item">
            <i class="pi pi-folder"></i>
            <span>Expedientes</span>
          </a>
          <a href="../07-busqueda/busqueda-container-page.html" class="nav-item">
            <i class="pi pi-search"></i>
            <span>Búsqueda</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Administración</div>
          <a href="../08-admin-usuarios/usuarios-list-page.html" class="nav-item">
            <i class="pi pi-users"></i>
            <span>Usuarios</span>
          </a>
          <a href="../09-auditoria/auditoria-page.html" class="nav-item">
            <i class="pi pi-history"></i>
            <span>Auditoría</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Cuenta</div>
          <a href="../10-cambiar-password/cambiar-password-page.html" class="nav-item">
            <i class="pi pi-lock"></i>
            <span>Cambiar Contraseña</span>
          </a>
          <a href="../01-login/login-page.html" class="nav-item">
            <i class="pi pi-sign-out"></i>
            <span>Cerrar Sesión</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        SGED v1.2.0 — OJ Guatemala
      </div>
    </aside>

    <!-- ============================================ -->
    <!-- MAIN CONTENT AREA                           -->
    <!-- ============================================ -->
    <div class="main-content">

      <!-- COMPONENTE: _topbar.html -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn-icon" title="Menú">
            <i class="pi pi-bars"></i>
          </button>
          <div class="topbar-breadcrumb">
            <span>SGED</span>
            <i class="pi pi-chevron-right" style="font-size: 0.6rem;"></i>
            <span class="current">Dashboard</span>
          </div>
        </div>
        <div class="topbar-right">
          <button class="btn-icon" title="Notificaciones">
            <i class="pi pi-bell"></i>
          </button>
          <div class="flex items-center gap-3">
            <div class="user-avatar">AG</div>
            <div style="line-height: 1.3;">
              <div style="font-size: var(--font-sm); font-weight: 600;">Amilcar Gil</div>
              <div style="font-size: var(--font-xs); color: var(--text-muted);">Administrador</div>
            </div>
          </div>
        </div>
      </header>

      <!-- PAGE CONTENT — Aquí se inserta el contenido de cada pantalla -->
      <main class="page-content fade-in">
        <div style="text-align: center; padding: 6rem 2rem; color: var(--text-muted);">
          <i class="pi pi-inbox" style="font-size: 4rem; opacity: 0.3;"></i>
          <p style="margin-top: var(--space-4); font-size: var(--font-lg);">Selecciona una sección del menú lateral</p>
        </div>
      </main>
    </div>

  </div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.querySelector('.topbar-left .btn-icon');
    const shell = document.querySelector('.app-shell');
    if (btn && shell) {
      btn.addEventListener('click', () => shell.classList.toggle('sidebar-collapsed'));
    }
  });
</script>
</body>
</html>
