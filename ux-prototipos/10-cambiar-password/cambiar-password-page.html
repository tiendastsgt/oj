<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGED — Cambiar Contraseña</title>
  <link rel="stylesheet" href="../css/elite-design-system.css">
  <style>
    .password-page { max-width: 520px; margin: 4rem auto; }
    .password-card { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-8); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
    .password-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--primary), var(--accent-cyan)); }
    .password-card h2 { font-size: var(--font-xl); font-weight: 800; margin-bottom: var(--space-1); }
    .password-card .subtitle { margin-bottom: var(--space-8); color: var(--text-secondary); }
    .password-strength { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.05); margin-top: var(--space-2); overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
    .password-strength-bar { height: 100%; border-radius: 3px; transition: width 0.3s, background 0.3s, box-shadow 0.3s; }
    .password-strength-bar.weak { width: 25%; background: var(--accent-rose); box-shadow: 0 0 8px var(--accent-rose); }
    .password-strength-bar.medium { width: 50%; background: var(--accent-amber); box-shadow: 0 0 8px var(--accent-amber); }
    .password-strength-bar.strong { width: 75%; background: var(--accent-cyan); box-shadow: 0 0 8px var(--accent-cyan); }
    .password-strength-bar.very-strong { width: 100%; background: var(--accent-emerald); box-shadow: 0 0 8px var(--accent-emerald); }
    .password-rules { list-style: none; margin-top: var(--space-4); display: flex; flex-direction: column; gap: var(--space-2); background: rgba(0,0,0,0.2); padding: var(--space-4); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .password-rules li { font-size: var(--font-xs); color: var(--text-secondary); display: flex; align-items: center; gap: var(--space-2); }
    .password-rules li i.check { color: var(--accent-emerald); filter: drop-shadow(0 0 5px rgba(16, 185, 129, 0.4)); }
    .password-rules li i.uncheck { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="app-shell">
    
    <!-- SIDEBAR v2.0 Dark Mode -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">OJ</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <a href="../03-dashboard/dashboard-page.html" class="nav-item" title="Dashboard"><i class="pi pi-th-large"></i></a>
          <a href="../04-expedientes-list/expedientes-list-page.html" class="nav-item" title="Expedientes"><i class="pi pi-folder"></i></a>
          <a href="../07-busqueda/busqueda-container-page.html" class="nav-item" title="Búsqueda"><i class="pi pi-search"></i></a>
        </div>
        <div class="nav-section">
          <a href="../08-admin-usuarios/usuarios-list-page.html" class="nav-item" title="Usuarios"><i class="pi pi-users"></i></a>
          <a href="../09-auditoria/auditoria-page.html" class="nav-item" title="Auditoría"><i class="pi pi-history"></i></a>
        </div>
        <div class="nav-section">
          <a href="#" class="nav-item active" title="Configuración"><i class="pi pi-cog"></i></a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <a href="../01-login/login-page.html" class="nav-item" title="Cerrar Sesión" style="width:44px;height:44px;"><i class="pi pi-sign-out"></i></a>
      </div>
    </aside>

    <div class="main-content">
      
      <!-- TOPBAR v2.0 Glass Dark -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-brand-text">
            <span class="brand-bold">SGED</span>
            <span class="brand-light">Cuenta</span>
          </div>
        </div>
        <div class="topbar-right">
          <div class="flex items-center gap-3">
            <div class="user-avatar">AG</div>
            <div>
              <div class="user-info-name">Amilcar Gil</div>
              <div class="user-info-role">Administrador</div>
            </div>
          </div>
        </div>
      </header>

      <main class="page-content fade-in">
        <div class="password-page">
          <div class="password-card">
            <div style="text-align:center; margin-bottom:var(--space-6);">
              <div style="width:64px;height:64px;border-radius:var(--radius-full);background:rgba(59, 130, 246, 0.1);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:var(--space-4);border:1px solid rgba(59, 130, 246, 0.3);box-shadow:0 0 20px rgba(59, 130, 246, 0.2);">
                <i class="pi pi-lock"></i>
              </div>
              <h2>Cambiar Contraseña</h2>
              <p class="subtitle">Actualice su credencial de acceso por seguridad</p>
            </div>

            <form>
              <div class="form-field" style="margin-bottom:var(--space-5);">
                <label class="form-label" style="color:var(--text-muted);"><i class="pi pi-key"></i> Contraseña Actual</label>
                <input type="password" class="form-input" style="background:rgba(255,255,255,0.02); color:var(--text-primary);" placeholder="Ingrese su contraseña actual">
              </div>

              <div class="form-field" style="margin-bottom:var(--space-3);">
                <label class="form-label" style="color:var(--text-muted);"><i class="pi pi-shield"></i> Nueva Contraseña</label>
                <input type="password" class="form-input" style="background:rgba(255,255,255,0.02); color:var(--text-primary);" placeholder="Ingrese la nueva contraseña">
                <div class="password-strength" style="margin-top: 8px;">
                  <div class="password-strength-bar strong"></div>
                </div>
              </div>

              <ul class="password-rules">
                <li><i class="pi pi-check-circle check"></i> Mínimo 8 caracteres</li>
                <li><i class="pi pi-check-circle check"></i> Al menos una letra mayúscula</li>
                <li><i class="pi pi-check-circle check"></i> Al menos un número</li>
                <li><i class="pi pi-circle uncheck"></i> Al menos un carácter especial (!@#$%)</li>
              </ul>

              <div class="form-field" style="margin-top:var(--space-6);margin-bottom:var(--space-6);">
                <label class="form-label" style="color:var(--text-muted);"><i class="pi pi-check-square"></i> Confirmar Nueva Contraseña</label>
                <input type="password" class="form-input" style="background:rgba(255,255,255,0.02); color:var(--text-primary);" placeholder="Repita la nueva contraseña">
              </div>

              <div style="display:flex;gap:var(--space-3);justify-content:flex-end;">
                <a href="../03-dashboard/dashboard-page.html" class="btn btn-secondary">Cancelar</a>
                <button type="button" class="btn btn-primary"><i class="pi pi-check"></i> Actualizar</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
