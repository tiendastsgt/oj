<!-- COMPONENTE: _usuario-form-seguridad.html     -->
<!-- Formulario: Seguridad y Acceso               -->
<!-- ============================================ -->
<div class="card mb-6">
  <div class="card-header">
    <h3 class="section-title"><i class="pi pi-shield"></i> Seguridad</h3>
  </div>
  <div class="card-body">
    <div class="grid-2">
      <div class="form-field">
        <label class="form-label">Nombre de Usuario</label>
        <div class="input-wrap">
          <i class="pi pi-user" style="position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.85rem;"></i>
          <input type="text" class="form-input" style="padding-left:2.5rem;" placeholder="Ej: juan.perez" autocomplete="new-username">
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Estado de la Cuenta</label>
        <select class="form-input form-select">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
          <option value="bloqueado">Bloqueado</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Contraseña Temporal</label>
        <div class="input-wrap">
          <i class="pi pi-lock" style="position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.85rem;"></i>
          <input type="password" class="form-input" style="padding-left:2.5rem;" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
        </div>
        <div style="font-size:var(--font-xs); color:var(--text-muted); margin-top:4px;">
          El usuario deberá cambiar su contraseña en el primer inicio de sesión.
        </div>
      </div>
    </div>
  </div>
</div>
