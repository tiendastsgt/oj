<!-- Formulario: Datos Personales                 -->
<!-- ============================================ -->
<div class="card mb-6">
  <div class="card-header">
    <h3 class="section-title"><i class="pi pi-id-card"></i> Datos Personales</h3>
  </div>
  <div class="card-body">
    <div class="grid-2">
      <div class="form-field">
        <label class="form-label">Nombre(s)</label>
        <input type="text" class="form-input" placeholder="Ej: Juan Carlos">
      </div>
      <div class="form-field">
        <label class="form-label">Apellidos</label>
        <input type="text" class="form-input" placeholder="Ej: Pérez García">
      </div>
      <div class="form-field">
        <label class="form-label">DPI</label>
        <input type="text" class="form-input" placeholder="Ej: 1234 56789 0101">
      </div>
      <div class="form-field">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" class="form-input" placeholder="Ej: juan.perez@oj.gob.gt">
      </div>
    </div>
  </div>
</div>
