<!-- ============================================ -->
<!-- COMPONENTE: _viewer-pdf.html                -->
<!-- Visor de documentos PDF embebido            -->
<!-- front end.md sección 5.1                    -->
<!-- Capacidades: navegación, zoom, descarga,    -->
<!-- impresión                                   -->
<!-- También se usa para Word convertido (5.2)   -->
<!-- ============================================ -->
<div class="viewer-container active-viewer">
  <div class="viewer-toolbar">
    <div class="doc-info">
      <div class="doc-icon"><i class="pi pi-file-pdf"></i></div>
      <div>
        <div class="doc-name">Resolución_Inicial_NAZ-847.pdf</div>
        <div class="doc-meta">PDF — 1.8 MB — Subido: 10 Abr 2026 por Amilcar Gil</div>
      </div>
    </div>
    <div class="toolbar-actions">
      <button class="btn-icon" title="Zoom -"><i class="pi pi-search-minus"></i></button>
      <button class="btn-icon" title="Zoom +"><i class="pi pi-search-plus"></i></button>
      <button class="btn-icon" title="Descargar"><i class="pi pi-download"></i></button>
      <button class="btn-icon" title="Imprimir"><i class="pi pi-print"></i></button>
      <button class="btn-icon" title="Cerrar"><i class="pi pi-times"></i></button>
    </div>
  </div>
  <div class="viewer-body">
    <!-- En Angular: <iframe [src]="pdfUrl | safe"> o <ngx-extended-pdf-viewer> -->
    <div style="width:100%;height:600px;background:#e2e8f0;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;color:var(--text-muted);">
      <i class="pi pi-file-pdf" style="font-size:4rem;color:var(--accent-rose);"></i>
      <p style="font-weight:600;">Vista previa del documento PDF</p>
      <p style="font-size:var(--font-xs);">Resolución_Inicial_NAZ-847.pdf — Página 1 de 8</p>
    </div>
  </div>
</div>
