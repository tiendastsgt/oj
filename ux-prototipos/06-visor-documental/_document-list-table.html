<!-- Dark data table with neon document types v2.0-->
<!-- ============================================ -->
<div style="margin-top: var(--space-4); overflow-x: auto;">
  <table class="data-table">
    <thead>
      <tr>
        <th>Nombre del documento <i class="pi pi-sort-alt sort-icon"></i></th>
        <th>Tipo <i class="pi pi-sort-alt sort-icon"></i></th>
        <th>Ext.</th>
        <th>Categoría</th>
        <th>Tamaño</th>
        <th>Usuario <i class="pi pi-sort-alt sort-icon"></i></th>
        <th>Agregado <i class="pi pi-sort-amount-down sort-icon" style="opacity:1;color:var(--primary)"></i></th>
        <th style="text-align:center">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>
          <div class="doc-name-cell">
            <div class="doc-type-icon pdf"><i class="pi pi-file-pdf"></i></div>
            <div><div class="doc-file-name">Resolución_Inicial_NAZ-847.pdf</div></div>
          </div>
        </td>
        <td>Resolución</td>
        <td><span class="doc-file-ext">.pdf</span></td>
        <td><span class="badge badge-proceso">Jurídico</span></td>
        <td>1.8 MB</td>
        <td>Amilcar Gil</td>
        <td>10 Abr 2026</td>
        <td>
          <div class="doc-actions" style="justify-content:center">
            <button class="btn-icon view" title="Ver"><i class="pi pi-eye"></i></button>
            <button class="btn-icon download" title="Descargar"><i class="pi pi-download"></i></button>
            <button class="btn-icon print" title="Imprimir"><i class="pi pi-print"></i></button>
          </div>
        </td>
      </tr>
      <tr>
        <td>
          <div class="doc-name-cell">
            <div class="doc-type-icon audio"><i class="pi pi-volume-up"></i></div>
            <div><div class="doc-file-name">Declaracion_Testigo_01.mp3</div></div>
          </div>
        </td>
        <td>Declaración</td>
        <td><span class="doc-file-ext">.mp3</span></td>
        <td><span class="badge badge-pendiente">Testimonial</span></td>
        <td>18 MB</td>
        <td>Juan López</td>
        <td>22 Mar 2026</td>
        <td>
          <div class="doc-actions" style="justify-content:center">
            <button class="btn-icon view" title="Reproducir audio"><i class="pi pi-play"></i></button>
            <button class="btn-icon download" title="Descargar"><i class="pi pi-download"></i></button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div class="table-footer">
  <span>Mostrando 1-2 de 12 documentos</span>
  <div style="display:flex;align-items:center;gap:var(--space-4);">
    <div class="pagination">
      <button><i class="pi pi-chevron-left"></i></button>
      <button class="active">1</button>
      <button>2</button>
      <button><i class="pi pi-chevron-right"></i></button>
    </div>
  </div>
</div>
