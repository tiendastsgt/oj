<!-- ============================================ -->
<!-- COMPONENTE: _viewer-image.html              -->
<!-- Dark image viewer v2.0                      -->
<!-- ============================================ -->
<div class="viewer-container active-viewer">
  <div class="viewer-toolbar">
    <div class="doc-info">
      <div class="doc-icon" style="background:rgba(16, 185, 129, 0.15);color:#34d399"><i class="pi pi-image"></i></div>
      <div>
        <div class="doc-name" style="font-weight:600;color:white;">Evidencia_Fotografica_01.jpg</div>
        <div class="doc-meta" style="font-size:var(--font-xs);color:var(--text-muted);">JPG — 3.2 MB — 4032×3024px</div>
      </div>
    </div>
    <div class="toolbar-actions">
      <button class="btn-icon" title="Zoom -"><i class="pi pi-search-minus"></i></button>
      <button class="btn-icon" title="Zoom +"><i class="pi pi-search-plus"></i></button>
      <button class="btn-icon" title="Ajustar"><i class="pi pi-window-maximize"></i></button>
      <button class="btn-icon" title="Descargar"><i class="pi pi-download"></i></button>
      <button class="btn-icon" title="Cerrar"><i class="pi pi-times"></i></button>
    </div>
  </div>
  <div class="viewer-body" style="background:#020617; display:flex; justify-content:center; align-items:center; min-height:600px; padding:1.5rem;">
    <!-- Utiliza canvas o renderizado de imagen embebido con zoom controls pan/tilt -->
    <div style="width:100%; height:100%; outline:1px dashed var(--border); display:flex; justify-content:center; align-items:center;">
      <i class="pi pi-image" style="font-size:5rem; color:rgba(255,255,255,0.05);"></i>
      <span style="position:absolute; color:var(--text-muted); font-size:var(--font-xs);">Image view frame</span>
    </div>
  </div>
</div>
