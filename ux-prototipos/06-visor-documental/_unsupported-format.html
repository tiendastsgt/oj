<div class="viewer-container active-viewer" style="text-align:center; padding: 4rem 2rem; background: var(--surface-card);">
  <i class="pi pi-exclamation-circle" style="font-size:4rem;color:var(--accent-amber); filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.4));"></i>
  <h4 style="margin-top:1.5rem;font-weight:700;font-size:1.5rem;color:var(--text-primary);">Formato no visualizable</h4>
  <p style="color:var(--text-secondary);margin-top:0.5rem;font-size:var(--font-base);">
    Este tipo de archivo no puede visualizarse directamente en el navegador.
  </p>
  <div style="margin-top:2rem; display:flex; gap:var(--space-4); justify-content:center;">
    <button class="btn btn-primary"><i class="pi pi-download"></i> Descargar archivo</button>
    <button class="btn btn-secondary"><i class="pi pi-info-circle"></i> Ver metadatos</button>
  </div>
</div>
