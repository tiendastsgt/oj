version: '3.8'

# Docker Compose para QA - SGED Stack
# Contiene: NGINX + Backend (Java) + Frontend (Angular) + BD Oracle/H2
# Uso:
#   docker-compose -f docker-compose-qa.yml up -d

services:
  # ========================================
  # NGINX Reverse Proxy + TLS + Frontend
  # ========================================
  nginx:
    image: nginx:latest-alpine
    container_name: sged-nginx-qa
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Configuración NGINX
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Frontend compilado Angular
      - ./sGED-frontend/dist/sged-frontend:/var/www/sged-frontend/dist/sged-frontend:ro
      # Certificados TLS (generar previamente con openssl)
      - ./nginx/certs:/etc/nginx/certs:ro
      # Logs
      - ./logs/nginx:/var/log/nginx
    networks:
      - sged-net
    depends_on:
      - sged-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # Backend Spring Boot (Java 21)
  # ========================================
  sged-backend:
    build:
      context: ./sGED-backend
      dockerfile: Dockerfile
      args:
        JAVA_VERSION: 21
    container_name: sged-backend-qa
    environment:
      # ========================================
      # Spring Profile: qa (uses H2 in-memory DB)
      # ========================================
      SPRING_PROFILES_ACTIVE: qa
      
      # ========================================
      # Secrets (required by SecretsPropertySourceLocator)
      # Note: Database connection is via H2 in-memory
      # ========================================
      JWT_SECRET: ${JWT_SECRET:sged-qa-jwt-secret-key-minimum-32-characters-long}
      JWT_EXPIRATION_MS: 28800000
      
      # ========================================
      # Document Storage (uses temp directory)
      # ========================================
      DOCUMENTOS_CONVERSION_ENABLED: "false"
      
      # ========================================
      # Logging Configuration
      # ========================================
      LOGGING_LEVEL_COM_OJ_SGED: INFO
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: INFO
      LOGGING_LEVEL_ORG_HIBERNATE: WARN
      
      # Management endpoints
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      
    ports:
      - "8080:8080"
    volumes:
      # Storage de documentos (uses temp directory in QA)
      - ./logs/backend:/var/log/sged
    networks:
      - sged-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ========================================
  # Base de Datos Oracle (COMENTADA para QA)
  # En QA usamos H2 in-memory configurado en application-qa.yml
  # Descomenta esta sección si necesitas una BD Oracle real
  # ========================================
  # sged-db:
  #   image: oracle-xe:21.3.0
  #   container_name: sged-db-qa
  #   environment:
  #     ORACLE_PWD: ${ORACLE_PWD:?error}
  #     ORACLE_SID: SGED
  #   ports:
  #     - "1521:1521"
  #   volumes:
  #     - ./data/oracle-db:/opt/oracle/oradata
  #     - ./sGED-backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
  #   networks:
  #     - sged-net
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "sqlplus", "-s", "sys/as sysdba"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 120s

networks:
  sged-net:
    driver: bridge
    name: sged-qa-network

volumes:
  oracle-data:
    driver: local
